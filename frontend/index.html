<!doctype html>
<html lang="en" class="gv-splash-active">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/gymvault-app-icon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#161d4f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GymVault" />
    <link rel="apple-touch-icon" sizes="180x180" href="/gymvault-app-icon-180.png" />
    <title>GymVault | Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Apple Sign-In (only initializes when APPLE_CLIENT_ID is configured) -->
    <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" defer></script>
    <script>
      tailwind.config = {
        theme: {
          screens: {
            sm: '640px',
            md: '768px',
            lg: '1024px',
            desktop: '1100px',
            xl: '1280px',
            '2xl': '1536px',
          },
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              slate: {
                900: '#0f172a',
                50: '#f8fafc',
              },
              emerald: {
                500: '#10b981',
              }
            }
          }
        }
      }
    </script>

    <script>
      (function () {
        try {
          var raw = window.localStorage.getItem('gymvault:ui-preferences');
          var parsed = raw ? JSON.parse(raw) : null;
          var hasDarkMode = parsed && Object.prototype.hasOwnProperty.call(parsed, 'dark_mode');
          var hasLegacyDarkMode = parsed && Object.prototype.hasOwnProperty.call(parsed, 'interface_dark_mode');
          var darkMode = hasDarkMode ? !!parsed.dark_mode : (hasLegacyDarkMode ? !!parsed.interface_dark_mode : true);
          document.documentElement.classList.toggle('gv-dark-mode', darkMode);
          document.documentElement.classList.toggle('gv-preboot-light', !darkMode);
        } catch (_err) {
          document.documentElement.classList.add('gv-dark-mode');
        }
      })();
    </script>

    <style type="text/css">
      html,
      body,
      #root {
        height: 100%;
        min-height: 100%;
      }

      /* Pre-React background — html uses same pre-compensation gradient as the splash */
      html {
        height: -webkit-fill-available;
        background: linear-gradient(to bottom, #1f2971 0px, #1f2971 calc(env(safe-area-inset-top, 44px) - 1px), #161d4f calc(env(safe-area-inset-top, 44px) + 12px));
      }
      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: -webkit-fill-available;
        background: #161d4f;
        margin: 0;
        font-family: 'Inter', sans-serif !important;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        min-height: 100vh;
        min-height: 100svh;
        min-height: -webkit-fill-available;
        background: #161d4f !important;
      }

      /* Ensure gv-preboot-light body colour is overridden while splash is active */
      html.gv-splash-active body,
      html.gv-splash-active #root {
        background: #161d4f !important;
      }

      html.gv-preboot-light body {
        background: #eef0ff;
      }

      html.gv-preboot-light #root {
        background: #eef0ff !important;
      }

      /* gv-splash-active must come after gv-preboot-light so it wins via cascade order */
      html.gv-splash-active body,
      html.gv-splash-active #root {
        background: #161d4f !important;
      }
      .premium-card {
        background: white;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Initialize Apple Sign-In once the SDK and the app are both ready -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (!window.AppleID) return;
        fetch('/api/auth/config')
          .then(function (r) { return r.json(); })
          .then(function (cfg) {
            if (!cfg.apple_client_id) return;
            window.AppleID.auth.init({
              clientId:    cfg.apple_client_id,
              scope:       'name email',
              redirectURI: window.location.origin,
              usePopup:    true,
            });
          })
          .catch(function () { /* Apple Sign-In config not available */ });
      });
    </script>
  </body>
</html>
