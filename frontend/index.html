<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f102d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" href="/vite.svg" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              slate: {
                900: '#0f172a',
                50: '#f8fafc',
              },
              emerald: {
                500: '#10b981',
              }
            }
          }
        }
      }

    <style type="text/css">
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        font-family: 'Inter', sans-serif !important;
        -webkit-font-smoothing: antialiased;
        background:
          radial-gradient(circle at 20% 18%, rgba(99, 102, 241, 0.12) 0%, transparent 48%),
          radial-gradient(circle at 82% 20%, rgba(168, 85, 247, 0.09) 0%, transparent 42%),
          radial-gradient(circle at 78% 82%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),

      }
      .premium-card {
        background: white;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
